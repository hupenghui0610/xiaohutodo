# 每次推送到 main 时自动部署到 Cloudflare Pages，固定域名：https://xiaohutodo.pages.dev
# --project-name 固定项目名，--branch=main 确保部署到生产环境（同一域名始终为最新）
# 首次使用前需在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加：
#   CLOUDFLARE_API_TOKEN - Cloudflare API 令牌（需含 Cloudflare Pages Edit 权限）
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare 账号 ID（在 Dashboard 右侧 API 区域可见）
name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy . --project-name=xiaohutodo --branch=main
